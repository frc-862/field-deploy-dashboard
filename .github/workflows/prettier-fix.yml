name: Prettier Auto-Fix

on:
  pull_request:
    branches: [main]

jobs:
  prettier:
    runs-on: ubuntu-latest
    # Crucial: The job needs write permissions to push back to the branch
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: [actions/checkout@v4](https://github.com/actions/checkout)
        with:
          # Use the head_ref to ensure we are on the PR branch, not a detached head
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: [actions/setup-node@v4](https://github.com)
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci # Faster than npm install for CI

      - name: Run Prettier (fix)
        run: npx prettier --write .

      - name: Commit changes
        uses: [stefanzweifel/git-auto-commit-action@v5](https://github.com/stefanzweifel/git-auto-commit-action)
        with:
          commit_message: "chore: auto-format code with Prettier"
