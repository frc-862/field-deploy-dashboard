name: Prettier Auto-Fix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prettier:
    runs-on: ubuntu-latest
    # Required to allow the action to push changes back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch all history so the action can commit and push back
          fetch-depth: 0
          # Ensure it uses the head of the PR, not the merge commit
          ref: ${{ github.head_ref }}

      - name: Prettify code
        uses: creyD/prettier_action@v4.3
        with:
          # This tells it to overwrite files with the formatted version
          prettier_options: --write . --ignore-path .prettierignore
          commit_message: "style: fixed formatting with prettier"
